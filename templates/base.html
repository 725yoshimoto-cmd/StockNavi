<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% block title %}StockNavi{% endblock %}</title>

  <style>
    .wrap {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 12px;
    }

    /* 下ナビぶんの余白（コンテンツが隠れないように） */
    body { margin: 0; }
    .content-pad { padding-bottom: 80px; }

    /* 下ナビ */
    .bottom-nav{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: center;   /* 中央寄せ */
      padding: 10px 0;
      background: #fff;
      border-top: 1px solid #ddd;
      z-index: 999;
    }
    .bottom-nav .nav-inner{
      width: 100%;
      max-width: 480px;          /* スマホ幅の箱に収める */
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
    }
    }
    .bottom-nav a {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border: 1px solid #bbb;
      border-radius: 10px;
      text-decoration: none;
      color: #222;
      font-size: 14px;
      line-height: 1.1;
      background: #fff;
      white-space: nowrap;
    }
    .bottom-nav a.is-active {
      border-color: #333;
      font-weight: 700;
    }

    /* ボタン類（既存） */
    .btn {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
    }
    .btn-danger { border-color: #b00; }

    /* 期限アラート色（既存） */
    .item-card.text-alert-red,
    .item-card.text-alert-red * {
      color: #dc3545 !important;
      font-weight: 600;
    }
    .item-card.text-alert-blue,
    .item-card.text-alert-blue * {
      color: #0d6efd !important;
      font-weight: 600;
    }
    .item-card.text-alert-red .cat-tag,
    .item-card.text-alert-blue .cat-tag {
      color: #fff !important;
    }
  </style>
</head>

<body>
  <div class="wrap content-pad">

    {% if messages %}
      <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}

  </div>

{% if user.is_authenticated %}
  <nav class="bottom-nav" style="position:sticky; bottom:0; background:#fff; padding:10px 0; border-top:1px solid #ddd;">
    <div class="nav-inner">
      
      <a href="{% url 'inventory:inventory_list' %}"
         class="{% if request.resolver_match.url_name == 'inventory_list' %}is-active{% endif %}">
        🏠<br>在庫
      </a>

      <a href="{% url 'inventory:balance' %}"
         class="{% if request.resolver_match.url_name == 'balance' %}is-active{% endif %}">
        📊<br>バランス
      </a>

      <a href="{% url 'inventory:memo_list' %}"
         class="{% if request.resolver_match.url_name|default:''|slice:':4' == 'memo' %}is-active{% endif %}">
        📝<br>メモ
      </a>

      <a href="{% url 'inventory:settings_tabs' %}"
         class="{% if request.resolver_match.url_name == 'settings_tabs' or request.resolver_match.url_name == 'settings' %}is-active{% endif %}">
        ⚙️<br>設定
      </a>

      <a href="{% url 'accounts:mypage' %}"
         class="{% if request.resolver_match.url_name == 'mypage' %}is-active{% endif %}">
        👤<br>マイページ
      </a>
    </nav>
  {% endif %}
</body>
</html>
