{% extends "base.html" %}

{% block content %}
<div class="wrap">
  <h2>ログイン</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">ログイン</button>
  </form>

  <p style="margin-top: 12px;">
    <a href="{% url 'accounts:password_reset' %}">パスワードを忘れた方はこちら</a>
  </p>

  <p style="margin-top: 12px;">
    <a href="{% url 'inventory:signup' %}" class="btn btn-outline">アカウント登録はこちら</a>
  </p>

</div>
{% endblock %}
