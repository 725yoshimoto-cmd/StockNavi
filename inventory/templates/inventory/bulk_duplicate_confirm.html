{% extends "base.html" %}
{% block content %}

<h1>複製確認</h1>
<p>選択した在庫を複製します。よろしいですか？</p>

<ul>
  {% for item in items %}
    <li>{{ item.name }}（数量: {{ item.quantity }}）</li>
  {% endfor %}
</ul>

<form method="post" action="{% url 'inventory:inventory_bulk_duplicate_execute' %}">
  {% csrf_token %}
  {% for id in selected_ids %}
    <input type="hidden" name="selected_ids" value="{{ id }}">
  {% endfor %}

  <button type="submit" class="btn btn-success">複製する</button>
  <a class="btn" href="{% url 'inventory:inventory_list' %}?select_mode=1">キャンセル</a>
</form>

{% endblock %}
