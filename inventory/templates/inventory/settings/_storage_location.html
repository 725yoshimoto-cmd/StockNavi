<h1>保管場所一覧</h1>

<p>
  <a href="{% url 'inventory:storage_location_add' %}?next={% url 'inventory:settings_tabs' %}%3Ftab%3Dstorage">
    ＋保管場所を追加
  </a>
</p>

<form method="get" action="" style="margin: 8px 0;">
  <input type="hidden" name="tab" value="storage">

  <input type="text" name="loc_q" value="{{ loc_q }}" placeholder="保管場所を検索">
  <input type="hidden" name="loc_sort" value="{{ loc_sort }}">

  <button type="submit">検索</button>

  {% if loc_q %}
    <a href="?tab=storage&loc_sort={{ loc_sort }}">クリア</a>
  {% endif %}
</form>

<p>
  並び替え：
  <a href="?tab=storage&loc_sort=created{% if loc_q %}&loc_q={{ loc_q }}{% endif %}">登録順</a> |
  <a href="?tab=storage&loc_sort=name{% if loc_q %}&loc_q={{ loc_q }}{% endif %}">50音順</a>
</p>

{% if locations %}
  <form method="post" action="{% url 'inventory:settings_tabs' %}"
        onsubmit="return confirm('選択した保管場所を削除しますか？');">
    {% csrf_token %}
    <input type="hidden" name="tab" value="storage">
    <input type="hidden" name="action" value="bulk_delete_storage">

    <button type="submit" class="btn btn-danger">選択削除</button>

    <ul style="list-style:none; padding:0;">
      {% for loc in locations %}
        <li style="display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #ddd;">
          <input type="checkbox" name="selected_ids" value="{{ loc.id }}">
          <a href="{% url 'inventory:storage_location_edit' loc.pk %}?next={% url 'inventory:settings_tabs' %}%3Ftab%3Dstorage"
            style="flex:1;">
            {{ loc.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </form>
{% else %}
  <p>保管場所はありません。</p>
{% endif %}
