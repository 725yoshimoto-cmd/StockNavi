<h1>保管場所一覧</h1>

  <p><a href="{% url 'inventory:storage_location_add' %}">＋保管場所を追加</a></p>
  
<form method="get" action="" style="margin: 8px 0;">
  <!-- ★ タブ固定（超重要） -->
  <input type="hidden" name="tab" value="storage">

  <input type="text" name="loc_q" value="{{ loc_q }}" placeholder="保管場所を検索">

  <!-- 並び替え状態を保持 -->
  <input type="hidden" name="loc_sort" value="{{ loc_sort }}">

  <button type="submit">検索</button>

  {% if loc_q %}
    <a href="?tab=storage&sort={{ loc_sort }}">クリア</a>
  {% endif %}
</form>

  <p>
    並び替え：
    <a href="?tab=storage&loc_sort=created{% if loc_q %}&loc_q={{ loc_q }}{% endif %}">登録順</a>
    <a href="?tab=storage&loc_sort=name{% if loc_q %}&loc_q={{ loc_q }}{% endif %}">50音順</a>
  </p>

  {% if locations %}
    <form method="post" action=""
          onsubmit="return confirm('選択した保管場所を削除しますか？');">
      {% csrf_token %}
      <input type="hidden" name="action" value="bulk_delete">

      <button type="submit" style="color:red;">選択削除</button>

      <ul style="list-style:none; padding:0;">
        {% for loc in locations %}
            <li style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 0; border-bottom:1px solid #ddd;">

            <!-- 左側（チェック + 名前） -->
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="checkbox" name="selected_ids" value="{{ loc.id }}">
                <span>{{ loc.name }}</span>
            </div>

            <!-- 右側（編集・削除） -->
            <div style="display:flex; gap:8px;">
                <a href="{% url 'inventory:storage_location_edit' loc.pk %}">編集</a>
                <a href="{% url 'inventory:storage_location_delete' loc.pk %}"
                style="color:red;"
                onclick="return confirm('この保管場所を削除しますか？');">
                削除
                </a>
            </div>

            </li>
        {% endfor %}
      </ul>
    </form>
  {% else %}
    <p>まだ保管場所が登録されていません。</p>
  {% endif %}
