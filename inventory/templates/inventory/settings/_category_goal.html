<h2>分類・目標設定</h2>

<hr>

<h3>目標備蓄日数</h3>

<form method="post" action="{% url 'inventory:settings_category_goal' %}">
  {% csrf_token %}
  <input type="hidden" name="action" value="save_target_days">

  <label>
    <input type="radio" name="target_choice" value="3"
      {% if household.target_days == 3 %}checked{% endif %}>
    3日分
  </label><br>

  <label>
    <input type="radio" name="target_choice" value="7"
      {% if household.target_days == 7 %}checked{% endif %}>
    7日分
  </label><br>

  <label>
    <input type="radio" name="target_choice" value="14"
      {% if household.target_days == 14 %}checked{% endif %}>
    14日分
  </label><br>

  <label>
    <input type="radio" name="target_choice" value="custom"
      {% if household.target_days != 3 and household.target_days != 7 and household.target_days != 14 %}checked{% endif %}>
    カスタム：
    <input type="number" name="custom_days"
           value="{{ household.target_days }}"
           min="1">
  </label>

  <br><br>
  <button type="submit">保存</button>
</form>

<hr>

<h3>分類</h3>

<form method="get" action="" style="margin: 8px 0;">
  <!-- ★ タブ固定 -->
  <input type="hidden" name="tab" value="category">

  <input type="text" name="q" value="{{ q }}" placeholder="分類を検索">
  <input type="hidden" name="sort" value="{{ sort }}">

  <button type="submit">検索</button>

  {% if q %}
    <a href="?tab=category&sort={{ sort }}">クリア</a>
  {% endif %}
</form>

<p>
  並び替え：
  <a href="?sort=created{% if q %}&q={{ q }}{% endif %}">登録順</a> |
  <a href="?tab=category&sort=name{% if q %}&q={{ q }}{% endif %}">50音順</a>
</p>

<ul style="list-style: none; padding: 0;">
  {% for c in categories %}
    <li style="display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #ddd;">

      <!-- 左側：分類名＋概要 -->
      <div>
        <a href="{% url 'inventory:category_edit' c.id %}?next={% url 'inventory:settings_tabs' %}%3Ftab%3Dcategory">
          {{ c.name }}
        </a>

        {% if c.description %}
          <div style="font-size: 12px; color: #666; margin-top: 4px;">
            {{ c.description }}
          </div>
        {% endif %}
      </div>

      <!-- 右側：削除 -->
      <a href="{% url 'inventory:category_delete' c.id %}"
         style="color: red; font-size: 14px;"
         onclick="return confirm('この分類を削除しますか？');">
         削除
      </a>

    </li>
  {% empty %}
    <li>分類がありません</li>
  {% endfor %}
</ul>
