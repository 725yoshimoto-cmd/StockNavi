<h2>アラート設定</h2>

<p class="note">
※全在庫一律設定
</p>

<form method="post" action="{% url 'inventory:settings_tabs' %}">
  {% csrf_token %}

  <!-- POST分岐用 -->
  <input type="hidden" name="tab" value="alert">
  <input type="hidden" name="action" value="save_alert_setting">

  <div class="form-group">
    <label>個数アラート</label>
    <div class="input-row">
      <input type="number" name="alert_quantity" value="1" min="0">
      <span>個以下</span>
    </div>
  </div>

  <div class="form-group">
    <label>期限アラート</label>
    <div class="input-row">
      <input type="number" name="alert_days" value="30" min="0">
      <span>日以内</span>
    </div>
  </div>

  <div class="submit-area">
    <button type="submit" class="btn">保存</button>
  </div>

</form>
