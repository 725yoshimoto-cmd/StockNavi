{% extends "base.html" %}
{% block title %}在庫を追加 / 編集{% endblock %}

{% block content %}
  <h1>在庫を追加 / 編集</h1>

  <p><a href="{% url 'inventory:inventory_list' %}">一覧へ戻る</a></p>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.non_field_errors }}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">保存</button>
  </form>
{% endblock %}
