{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 520px; margin: 0 auto; padding: 16px;">
  <h1 style="font-size: 20px; margin-bottom: 12px;">メンバー招待</h1>

  <p style="margin-bottom: 12px;">
    招待リンクを発行して、家族/メンバーに共有してください。
  </p>

  <form method="post" style="margin-bottom: 16px;">
    {% csrf_token %}

    <label style="display:block; margin: 0 0 6px;">招待リンク送付先メールアドレス</label>
    <input
      type="email"
      name="email"
      placeholder="example@mail.com"
      required
      style="width:100%; padding:8px; margin-bottom: 12px;"
    >

    <button type="submit" class="btn btn-primary" style="width: 100%;">
      招待リンクを発行する
    </button>
  </form>

  {% if invite_url %}
    <div style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
      <p style="margin: 0 0 8px;">発行した招待リンク：</p>
      <input
        type="text"
        value="{{ invite_url }}"
        readonly
        style="width: 100%; padding: 8px; font-size: 14px;"
      >
      <p style="margin: 8px 0 0; font-size: 12px; color: #666;">
        有効期限：{{ expires_at|date:"Y/m/d H:i" }}
      </p>
    </div>
  {% endif %}
</div>
{% endblock %}
