{% extends "base.html" %}

{% block content %}
  <h2>{% if object %}保管場所を編集{% else %}保管場所を追加{% endif %}</h2>

  <form method="post">
    <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">登録</button>
  </form>

  <p><a href="{{ request.GET.next|default:'{% url "inventory:settings_tabs" %}?tab=storage' }}">一覧に戻る</a></p>
{% endblock %}
